<svg width="1800" height="1460" viewBox="0 0 1800 1460" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9EC"/>
      <stop offset="1" stop-color="#FFF4F4"/>
    </linearGradient>
    <linearGradient id="frontCard" x1="120" y1="0" x2="1680" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="backendCard" x1="120" y1="0" x2="1680" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF8E7"/>
      <stop offset="1" stop-color="#FFF3E8"/>
    </linearGradient>
    <linearGradient id="dbCard" x1="120" y1="0" x2="1680" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FFF1F2"/>
    </linearGradient>
    <linearGradient id="extCard" x1="120" y1="0" x2="1680" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFBEB"/>
      <stop offset="1" stop-color="#FEF2F2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#D6C7A7" flood-opacity="0.28"/>
    </filter>
    <marker id="arrowHead" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 Z" fill="#F59E0B"/>
    </marker>
    <style>
      .title { font: 700 44px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111827; }
      .subtitle { font: 500 20px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #6B7280; }
      .layer { font: 700 30px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #1F2937; }
      .boxTitle { font: 700 23px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #111827; }
      .boxBody { font: 400 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #374151; }
      .small { font: 600 16px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #B45309; }
      .footer { font: 500 18px 'Microsoft YaHei', 'Noto Sans SC', sans-serif; fill: #6B7280; }
    </style>
  </defs>

  <rect width="1800" height="1460" fill="url(#bg)"/>

  <text x="900" y="72" text-anchor="middle" class="title">Claw Pond 项目完整架构图</text>
  <text x="900" y="110" text-anchor="middle" class="subtitle">按 前端 / 后端 / 数据库 / 外部依赖 还原项目真实结构</text>

  <rect x="120" y="150" width="1560" height="260" rx="34" fill="url(#frontCard)" filter="url(#shadow)"/>
  <text x="160" y="200" class="layer">前端层 Frontend</text>

  <rect x="160" y="230" width="300" height="140" rx="24" fill="#FFFFFF" stroke="#F4D9A6" stroke-width="2"/>
  <text x="185" y="268" class="boxTitle">页面层</text>
  <text x="185" y="300" class="boxBody">首页 / 帖子列表 / 详情页</text>
  <text x="185" y="328" class="boxBody">发帖编辑 / 登录注册 / 个人中心</text>
  <text x="185" y="356" class="small">src/app</text>

  <rect x="500" y="230" width="300" height="140" rx="24" fill="#FFFFFF" stroke="#F4D9A6" stroke-width="2"/>
  <text x="525" y="268" class="boxTitle">客户端组件</text>
  <text x="525" y="300" class="boxBody">表单交互 / 点赞收藏按钮</text>
  <text x="525" y="328" class="boxBody">评论框 / 状态提示 / 主题切换</text>
  <text x="525" y="356" class="small">src/components</text>

  <rect x="840" y="230" width="300" height="140" rx="24" fill="#FFFFFF" stroke="#F4D9A6" stroke-width="2"/>
  <text x="865" y="268" class="boxTitle">富文本编辑器</text>
  <text x="865" y="300" class="boxBody">Tiptap 编辑器</text>
  <text x="865" y="328" class="boxBody">图片粘贴 / 拖拽 / 上传</text>
  <text x="865" y="356" class="small">post-rich-text-editor.tsx</text>

  <rect x="1180" y="230" width="460" height="140" rx="24" fill="#FFFFFF" stroke="#F4D9A6" stroke-width="2"/>
  <text x="1205" y="268" class="boxTitle">全局 UI 框架</text>
  <text x="1205" y="300" class="boxBody">Layout / Header / Footer / Providers / ThemeProvider</text>
  <text x="1205" y="328" class="boxBody">站点导航、品牌配置、全局样式</text>
  <text x="1205" y="356" class="small">layout.tsx / site-header.tsx / providers.tsx / globals.css</text>

  <rect x="120" y="450" width="1560" height="460" rx="34" fill="url(#backendCard)" filter="url(#shadow)"/>
  <text x="160" y="500" class="layer">后端层 Backend</text>

  <rect x="160" y="530" width="360" height="150" rx="24" fill="#FFFFFF" stroke="#F4C67A" stroke-width="2"/>
  <text x="185" y="568" class="boxTitle">Server Components</text>
  <text x="185" y="600" class="boxBody">页面首屏数据在服务端查询后直接渲染</text>
  <text x="185" y="628" class="boxBody">典型页面：home / posts / post detail / me</text>
  <text x="185" y="656" class="small">页面 SSR + RSC 数据组装</text>

  <rect x="560" y="530" width="360" height="150" rx="24" fill="#FFFFFF" stroke="#F4C67A" stroke-width="2"/>
  <text x="585" y="568" class="boxTitle">Server Actions</text>
  <text x="585" y="600" class="boxBody">发帖 / 编辑 / 删除 / 评论</text>
  <text x="585" y="628" class="boxBody">点赞 / 收藏 / 修改用户名 / revalidatePath</text>
  <text x="585" y="656" class="small">src/app/posts/actions.ts + src/app/me/actions.ts</text>

  <rect x="960" y="530" width="360" height="150" rx="24" fill="#FFFFFF" stroke="#F4C67A" stroke-width="2"/>
  <text x="985" y="568" class="boxTitle">Route Handlers API</text>
  <text x="985" y="600" class="boxBody">/api/auth/* 认证接口</text>
  <text x="985" y="628" class="boxBody">/api/posts/inline-images 图片上传接口</text>
  <text x="985" y="656" class="small">src/app/api</text>

  <rect x="1360" y="530" width="280" height="150" rx="24" fill="#FFFFFF" stroke="#F4C67A" stroke-width="2"/>
  <text x="1385" y="568" class="boxTitle">会话层</text>
  <text x="1385" y="600" class="boxBody">自定义 Cookie Session</text>
  <text x="1385" y="628" class="boxBody">登录态读取、创建、销毁</text>
  <text x="1385" y="656" class="small">src/lib/auth/session.ts</text>

  <rect x="160" y="720" width="460" height="150" rx="24" fill="#FFFFFF" stroke="#F4C67A" stroke-width="2"/>
  <text x="185" y="758" class="boxTitle">社区服务层</text>
  <text x="185" y="790" class="boxBody">帖子查询、详情查询、发帖、编辑、删帖、评论</text>
  <text x="185" y="818" class="boxBody">热门排序、待解决判断、浏览量与互动状态计算</text>
  <text x="185" y="846" class="small">src/lib/community.ts</text>

  <rect x="660" y="720" width="460" height="150" rx="24" fill="#FFFFFF" stroke="#F4C67A" stroke-width="2"/>
  <text x="685" y="758" class="boxTitle">认证服务层</text>
  <text x="685" y="790" class="boxBody">验证码生成、哈希校验、限流、密码哈希、找回密码</text>
  <text x="685" y="818" class="boxBody">邮件模板、邮件发送、请求解析、安全校验</text>
  <text x="685" y="846" class="small">src/lib/auth/*</text>

  <rect x="1160" y="720" width="480" height="150" rx="24" fill="#FFFFFF" stroke="#F4C67A" stroke-width="2"/>
  <text x="1185" y="758" class="boxTitle">辅助服务层</text>
  <text x="1185" y="790" class="boxBody">用户资料与用户名校验、正文 HTML 清洗、附件校验、正文图片存储</text>
  <text x="1185" y="818" class="boxBody">slug 生成、摘要提取、富文本内容标准化</text>
  <text x="1185" y="846" class="small">user/service.ts + post-content.ts + post-attachments.ts + post-inline-images.ts</text>

  <rect x="120" y="950" width="1560" height="290" rx="34" fill="url(#dbCard)" filter="url(#shadow)"/>
  <text x="160" y="1000" class="layer">数据库层 Database</text>

  <rect x="160" y="1030" width="300" height="170" rx="24" fill="#FFFFFF" stroke="#F2B279" stroke-width="2"/>
  <text x="185" y="1068" class="boxTitle">用户域</text>
  <text x="185" y="1100" class="boxBody">User</text>
  <text x="185" y="1128" class="boxBody">Session</text>
  <text x="185" y="1156" class="boxBody">Account / Authenticator</text>
  <text x="185" y="1184" class="small">用户资料、会话、兼容认证模型</text>

  <rect x="500" y="1030" width="300" height="170" rx="24" fill="#FFFFFF" stroke="#F2B279" stroke-width="2"/>
  <text x="525" y="1068" class="boxTitle">认证域</text>
  <text x="525" y="1100" class="boxBody">EmailVerificationCode</text>
  <text x="525" y="1128" class="boxBody">验证码、用途、过期时间</text>
  <text x="525" y="1156" class="boxBody">尝试次数、IP 限流信息</text>
  <text x="525" y="1184" class="small">注册 / 找回密码核心表</text>

  <rect x="840" y="1030" width="300" height="170" rx="24" fill="#FFFFFF" stroke="#F2B279" stroke-width="2"/>
  <text x="865" y="1068" class="boxTitle">内容域</text>
  <text x="865" y="1100" class="boxBody">Post</text>
  <text x="865" y="1128" class="boxBody">Comment</text>
  <text x="865" y="1156" class="boxBody">Tag</text>
  <text x="865" y="1184" class="small">帖子、评论、标签与多对多关系</text>

  <rect x="1180" y="1030" width="300" height="170" rx="24" fill="#FFFFFF" stroke="#F2B279" stroke-width="2"/>
  <text x="1205" y="1068" class="boxTitle">互动域</text>
  <text x="1205" y="1100" class="boxBody">PostLike</text>
  <text x="1205" y="1128" class="boxBody">PostFavorite</text>
  <text x="1205" y="1156" class="boxBody">PostView</text>
  <text x="1205" y="1184" class="small">点赞、收藏、浏览去重统计</text>

  <rect x="1520" y="1030" width="120" height="170" rx="24" fill="#FFFFFF" stroke="#F2B279" stroke-width="2"/>
  <text x="1545" y="1068" class="boxTitle">附件域</text>
  <text x="1545" y="1108" class="boxBody">PostAttachment</text>
  <text x="1545" y="1168" class="small">文件元信息</text>

  <rect x="120" y="1280" width="1560" height="120" rx="34" fill="url(#extCard)" filter="url(#shadow)"/>
  <text x="160" y="1330" class="layer">外部依赖与存储</text>

  <rect x="500" y="1305" width="360" height="70" rx="20" fill="#FFFFFF" stroke="#F5C06A" stroke-width="2"/>
  <text x="525" y="1349" class="boxBody">本地文件存储：public/uploads/post-inline-images / post-attachments</text>

  <rect x="900" y="1305" width="260" height="70" rx="20" fill="#FFFFFF" stroke="#F5C06A" stroke-width="2"/>
  <text x="925" y="1349" class="boxBody">邮件服务：Resend / SMTP / Dev Fallback</text>

  <rect x="1200" y="1305" width="220" height="70" rx="20" fill="#FFFFFF" stroke="#F5C06A" stroke-width="2"/>
  <text x="1225" y="1349" class="boxBody">Prisma ORM + PostgreSQL</text>

  <line x1="310" y1="370" x2="310" y2="520" stroke="#F59E0B" stroke-width="5" marker-end="url(#arrowHead)"/>
  <line x1="650" y1="370" x2="740" y2="520" stroke="#F59E0B" stroke-width="5" marker-end="url(#arrowHead)"/>
  <line x1="990" y1="370" x2="1140" y2="520" stroke="#F59E0B" stroke-width="5" marker-end="url(#arrowHead)"/>
  <line x1="1410" y1="370" x2="1500" y2="520" stroke="#F59E0B" stroke-width="5" marker-end="url(#arrowHead)"/>

  <line x1="390" y1="870" x2="390" y2="1020" stroke="#F97316" stroke-width="5" marker-end="url(#arrowHead)"/>
  <line x1="890" y1="870" x2="890" y2="1020" stroke="#F97316" stroke-width="5" marker-end="url(#arrowHead)"/>
  <line x1="1400" y1="870" x2="1400" y2="1020" stroke="#F97316" stroke-width="5" marker-end="url(#arrowHead)"/>

  <line x1="680" y1="1200" x2="680" y2="1295" stroke="#EA580C" stroke-width="5" marker-end="url(#arrowHead)"/>
  <line x1="1030" y1="1200" x2="1030" y2="1295" stroke="#EA580C" stroke-width="5" marker-end="url(#arrowHead)"/>
  <line x1="1310" y1="1200" x2="1310" y2="1295" stroke="#EA580C" stroke-width="5" marker-end="url(#arrowHead)"/>

  <text x="900" y="1432" text-anchor="middle" class="footer">核心运行方式：前端页面与客户端交互 → Next.js 服务端组件 / Server Actions / API → 服务层 → Prisma → PostgreSQL / 文件系统 / 邮件服务</text>
</svg>
